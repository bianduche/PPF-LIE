# Training configuration for ML (Metallographic Low-light) Dataset

# Model configuration
model:
  name: PPFLIE
  in_channels: 3
  out_channels: 3
  base_channels: 64
  num_layers: 6
  time_steps: 1000
  beta_start: 0.0001
  beta_end: 0.02

# Diffusion configuration
diffusion:
  schedule: linear
  loss_type: poisson_nll  # Key: Poisson NLL loss instead of L2
  variance_schedule:
    type: linear
    beta_start: 0.0001
    beta_end: 0.02

# CCM (Color Consistency Module) configuration
ccm:
  enable: true
  hidden_dim: 128
  num_affine: 3

# Training configuration
train:
  # Data paths
  data_root: ./datasets/ML
  train_low_dir: train/low
  train_high_dir: train/high
  annotation_file: train/annotations.json

  # Data augmentation
  img_size: 512
  crop_size: 512
  random_flip: true
  rotation_degrees: 15

  # Training parameters
  batch_size: 4  # Smaller batch size due to higher resolution
  num_workers: 4
  epochs: 500
  learning_rate: 0.0001
  weight_decay: 0.0001
  scheduler:
    type: cosine
    warmup_epochs: 10

  # Loss weights - Higher weights for industrial defect preservation
  loss_weights:
    diffusion: 1.0
    perceptual: 0.15  # Higher for better structure preservation
    color: 0.08       # Higher for industrial color accuracy
    tv: 0.02          # Higher for smoother defects

  # Optimizer
  optimizer:
    type: adam
    betas: [0.9, 0.999]
    eps: 1.0e-08

  # Logging
  log_interval: 50
  val_interval: 5
  save_interval: 10

  # Paths
  checkpoint_dir: ./experiments/ml
  log_dir: ./experiments/ml/logs

# Hardware
device: cuda
seed: 42
